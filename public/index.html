<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <title>Rock Paper Scissors - Multiplayer</title>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-highest": "#333333",
            "on-tertiary-fixed": "#e3e3e3",
            "inverse-surface": "#f1f0f5",
            "on-error": "#ffffff",
            "on-tertiary-container": "#c4c7c7",
            "on-secondary": "#1a1b1f",
            "on-primary-container": "#e3e3e3",
            "primary": "#ffffff",
            "inverse-on-surface": "#2f3034",
            "surface": "#121212",
            "surface-container-high": "#2c2c2c",
            "on-surface-variant": "#c4c7c7",
            "on-background": "#e3e2e6",
            "primary-fixed": "#474747",
            "surface-variant": "#444748",
            "on-primary": "#1a1b1f",
            "on-tertiary": "#1a1b1f",
            "surface-dim": "#1a1b1f",
            "inverse-primary": "#181919",
            "outline-variant": "#444748",
            "secondary": "#c6c6c8",
            "surface-tint": "#ffffff",
            "surface-container": "#1e1e1e",
            "primary-container": "#e4e2e1",
            "error": "#ffb4ab",
            "secondary-fixed-dim": "#5d5e60",
            "primary-fixed-dim": "#c8c6c6",
            "tertiary-fixed-dim": "#c6c6c7",
            "secondary-container": "#454749",
            "surface-container-lowest": "#000000",
            "on-surface": "#e3e2e6",
            "on-secondary-fixed-variant": "#e2e2e4",
            "on-tertiary-fixed-variant": "#e2e2e2",
            "on-primary-fixed": "#ffffff",
            "on-secondary-container": "#c6c6c8",
            "outline": "#8e9192",
            "on-secondary-fixed": "#ffffff",
            "tertiary": "#ffffff",
            "on-error-container": "#ffdad6",
            "on-primary-fixed-variant": "#ffffff",
            "secondary-fixed": "#454749",
            "surface-container-low": "#1a1b1f",
            "tertiary-container": "#454747",
            "tertiary-fixed": "#454747",
            "surface-bright": "#38393e",
            "error-container": "#93000a",
            "background": "#121212"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "xl": "64px",
            "md": "24px",
            "sm": "12px",
            "gutter": "24px",
            "lg": "40px",
            "base": "8px",
            "xs": "4px",
            "margin": "32px"
          },
          "fontFamily": {
            "headline-xl": ["Inter"],
            "label-md": ["Inter"],
            "headline-md": ["Inter"],
            "headline-lg": ["Inter"],
            "body-md": ["Inter"],
            "label-sm": ["Inter"],
            "body-lg": ["Inter"]
          },
          "fontSize": {
            "headline-xl": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "600" }],
            "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
            "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "body-md": ["16px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
            "label-sm": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500" }],
            "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }]
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #121212;
      font-family: 'Inter', sans-serif;
    }
    .neomorph-raised {
      box-shadow: -5px -5px 15px rgba(255,255,255,0.02), 5px 5px 15px rgba(0,0,0,0.4);
    }
    .neomorph-recessed {
      box-shadow: inset -2px -2px 5px rgba(255,255,255,0.02), inset 2px 2px 5px rgba(0,0,0,0.4);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-background text-on-background">
  <main class="w-full max-w-md p-gutter">
    <!-- HOME SCREEN -->
    <div id="homeScreen" class="screen active bg-[#1E1E1E] rounded-xl p-lg neomorph-raised text-center space-y-md">
      <div class="space-y-xs">
        <h2 class="font-headline-md text-primary">Rock Paper Scissors</h2>
        <p class="font-body-md text-on-secondary-container">Play with a Friend online</p>
      </div>
      <div class="pt-sm">
        <button id="createBtn" class="w-full h-14 bg-[#2C2C2C] rounded-full neomorph-raised active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 hover:opacity-90">
          <span class="font-label-md text-primary">Create Game</span>
        </button>
      </div>
      <div class="pt-sm">
        <div class="relative">
          <input id="gameCodeInput" class="w-full h-14 bg-[#181818] border-none rounded-xl neomorph-recessed px-md font-body-lg text-primary text-center tracking-[0.5em] focus:ring-1 focus:ring-outline-variant placeholder:tracking-normal placeholder:text-gray-600" placeholder="Enter code" type="text" />
        </div>
      </div>
      <div class="text-on-secondary-container font-label-sm py-2">or</div>
      <div class="flex flex-col gap-sm pt-sm">
        <button id="joinBtn" class="w-full h-14 bg-[#2C2C2C] rounded-full neomorph-raised active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 hover:opacity-90">
          <span class="font-label-md text-primary">Join Game</span>
          <span class="material-symbols-outlined text-sm text-primary">arrow_forward</span>
        </button>
      </div>
    </div>

    <!-- WAITING SCREEN -->
    <div id="waitingScreen" class="screen bg-[#1E1E1E] rounded-xl p-lg neomorph-raised text-center space-y-md">
      <div class="space-y-xs">
        <h2 class="font-headline-md text-primary">Waiting for Player 2</h2>
        <p class="font-body-md text-on-secondary-container">Share this code:</p>
      </div>
      <div class="py-lg">
        <div id="gameCode" class="font-headline-xl text-primary tracking-[0.1em] font-bold">LOADING...</div>
      </div>
      <div class="flex justify-center py-md">
        <div class="w-10 h-10 border-4 border-[#2C2C2C] border-t-primary rounded-full animate-spin"></div>
      </div>
      <button id="backBtn1" class="w-full h-12 bg-[#2C2C2C] rounded-full neomorph-raised active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 hover:opacity-90">
        <span class="font-label-md text-primary">Back</span>
      </button>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen bg-[#1E1E1E] rounded-xl p-lg neomorph-raised text-center space-y-md">
      <div class="space-y-xs">
        <h2 class="font-headline-md text-primary">Make Your Move</h2>
        <p id="gameStatus" class="font-body-md text-on-secondary-container">Choose rock, paper, or scissors</p>
      </div>

      <!-- Move Buttons -->
      <div class="grid grid-cols-3 gap-sm pt-md">
        <button class="move-btn h-20 rounded-xl bg-[#2C2C2C] neomorph-raised active:scale-95 transition-all duration-200 flex flex-col items-center justify-center hover:opacity-90" data-move="rock">
          
          <span class="font-label-sm text-primary text-xs mt-1">Rock</span>
        </button>
        <button class="move-btn h-20 rounded-xl bg-[#2C2C2C] neomorph-raised active:scale-95 transition-all duration-200 flex flex-col items-center justify-center hover:opacity-90" data-move="paper">
          
          <span class="font-label-sm text-primary text-xs mt-1">Paper</span>
        </button>
        <button class="move-btn h-20 rounded-xl bg-[#2C2C2C] neomorph-raised active:scale-95 transition-all duration-200 flex flex-col items-center justify-center hover:opacity-90" data-move="scissors">
          
          <span class="font-label-sm text-primary text-xs mt-1">Scissors</span>
        </button>
      </div>

      <!-- Result Display -->
      <div id="result" class="result hidden bg-[#2C2C2C] rounded-xl p-lg neomorph-recessed text-center space-y-md mt-lg">
        <p id="resultText" class="font-headline-md text-primary">You won!</p>
        <button id="playAgainBtn" class="w-full h-12 bg-[#1E1E1E] rounded-full neomorph-raised active:scale-95 transition-all duration-200 flex items-center justify-center hover:opacity-90">
          <span class="font-label-md text-primary">Play Again</span>
        </button>
      </div>

      <button id="backBtn2" class="w-full h-12 bg-[#2C2C2C] rounded-full neomorph-raised active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 hover:opacity-90 mt-md">
        <span class="font-label-md text-primary">Back to Home</span>
      </button>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
